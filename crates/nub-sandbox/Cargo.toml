[package]
name = "nub-sandbox"
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

# The OS-enforced sandbox ENGINE for nub — PM-PURE by construction (Boundary B):
# it takes only already-parsed data (a serde value + host-provided paths/env) and
# has ZERO dependency on nub-cli / nub-core / vendor/aube. This is what keeps the
# future build-jail embedder seam clean — aube's lifecycle.rs will wire to
# compile()/apply() without dragging any PM type across the boundary. Do NOT add a
# nub-cli/nub-core/aube dependency here; an impact-analysis review leg asserts the
# graph. See epics/sandbox/design.md §2 (the two boundaries).

[dependencies]
serde = { workspace = true }
serde_json = { workspace = true }
tracing = { workspace = true }
# Matcher stack: globset+ignore is ripgrep's gitignore engine (cross-platform
# path normalization built in); regex backs the env /regex/ grammar; ipnet parses
# net CIDRs. All four are already in the workspace lockfile (transitive) — no new
# supply-chain surface.
globset = "0.4"
ignore = "0.4"
regex = "1"
ipnet = { version = "2", features = ["serde"] }

[target.'cfg(target_os = "linux")'.dependencies]
# Backend deps declared now so later stages (S4) slot in without a Cargo churn;
# unused until the Linux backend lands.
libc = { workspace = true }

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
