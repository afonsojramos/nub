name: Daily-driver smoke

# Exercises the full nub surface against a real Vite + React + TypeScript project.
# Covers: PM install (pnpm, real registry), type-check (tsc), build (Vite), test
# (vitest), `nub <file.ts>` with a real node_modules import, and `nub --node`
# augmentation-off negative control.
#
# This is the "would a real app still work after this change?" gate. It is the
# complement to cargo test's synthetic fixtures: those cover individual code paths;
# this covers the composed surface a user actually sees.
#
# Why separate workflow: the fixture installs ~300 packages (Vite + React + vitest)
# from the real registry. That's too heavy for the main ci.yml matrix. A path filter
# fires this only when nub itself (crates/, runtime/, vendor/aube) changed.

on:
  push:
    branches: [main]
    paths:
      - "crates/**"
      - "runtime/**"
      - "vendor/aube/**"
      - "tests/daily-driver/**"
      - ".github/workflows/daily-driver.yml"
  pull_request:
    branches: [main]
    paths:
      - "crates/**"
      - "runtime/**"
      - "vendor/aube/**"
      - "tests/daily-driver/**"
      - ".github/workflows/daily-driver.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  daily-driver:
    name: Daily-driver (ubuntu, node 24)
    runs-on: ubuntu-latest
    # Real registry install + Vite build + vitest can be slow on cold runners.
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd  # v5
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8  # stable
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32  # v2
      - uses: pnpm/action-setup@fc06bc1257f339d1d5d8b3a19a8cae5388b55320  # v5
        with:
          version: 10
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444  # v5
        with:
          node-version: "24"
          # No `cache: pnpm` here: the smoke installs into a throwaway temp fixture
          # via the freshly-built `nub`, so no repo-root pnpm install ever populates
          # the pnpm store. setup-node's post-cleanup cache-save then validates the
          # (non-existent) store path and fails the job — even though every smoke
          # scenario passed. The cache offered zero speedup and only this failure mode.
      - name: Build nub + native addon
        shell: bash
        run: |
          cargo build -p nub-cli
          # nub-native is its own workspace (split so the CLI uses panic=abort while
          # the cdylib keeps panic=unwind); build it from inside the crate. Its local
          # .cargo/config.toml routes output into the shared root target/.
          (cd crates/nub-native && cargo build)
          mkdir -p runtime/addons
          cp target/debug/libnub_native.so runtime/addons/nub-native.node
      - name: Run daily-driver smoke
        run: tests/daily-driver/run.sh target/debug/nub
